name: CI

on:
  push:
    branches: [main, develop, "refactor/**"]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.8.6
      - run: ruff check src/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mypy pydantic==2.7.3 fastapi==0.111.0
      - run: mypy src/ --ignore-missing-imports

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          pip install pytest==8.3.4 pytest-asyncio==0.24.0 \
            pydantic==2.7.3 fastapi==0.111.0 python-dotenv==1.0.1 \
            python-multipart==0.0.9 uvicorn==0.29.0 pydub==0.25.1 \
            anthropic==0.42.0 qdrant-client==1.12.1 sse-starlette==2.1.3
      - name: Run unit tests
        run: python -m pytest tests/unit/ -v
      - name: Run integration tests
        run: python -m pytest tests/integration/ -v

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit
      - run: bandit -r src/ -c pyproject.toml || bandit -r src/ -s B101
